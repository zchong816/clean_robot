<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>ROS2 SLAM Map Viewer</title>

  <script src="easeljs.min.js"></script>
<script src="eventemitter2.min.js"></script>
<script src="roslib.min.js"></script>
<script src="ros2d.js"></script>
  <style>
    #map {
      width: 800px;
      height: 600px;
      border: 1px solid black;
      background-color: #f5f5f5;
    }
  </style>
</head>

<body>
  <h2>SLAM 地图实时显示（自动更新）</h2>
  <div id="map"></div>

  <script>
    // 1. 连接 rosbridge（替换为你的 rosbridge 地址）
    const ros = new ROSLIB.Ros({
      url: 'ws:///192.168.50.99:9090'
    });

    // 连接状态回调
    ros.on('connection', function () {
      console.log('✅ 已连接到 rosbridge');
    });
    ros.on('error', function (error) {
      console.error('❌ 连接错误:', error);
    });
    ros.on('close', function () {
      console.log('🔌 连接已关闭');
    });

    // 2. 创建 ROS2D 视图容器
    const viewer = new ROS2D.Viewer({
      divID: 'map',
      width: 800,
      height: 600,
      background: '#f5f5f5' // 背景色
    });

    // 3. 定义地图图层变量（用于销毁旧图层）
    let mapLayer = null;

    // 4. 显式订阅 /map 话题，监听实时更新
    const mapTopic = new ROSLIB.Topic({
      ros: ros,
      name: '/map',
      messageType: 'nav_msgs/OccupancyGrid' // ROS2 话题类型（注意格式）
    });

    // 5. 核心：收到新地图数据时重新渲染
    mapTopic.subscribe(function (mapMsg) {
      console.log('📌 收到新地图数据，尺寸：', mapMsg.info.width, 'x', mapMsg.info.height);
      
      // 销毁旧的地图图层（避免叠加）
      if (mapLayer) {
        viewer.scene.removeChild(mapLayer);
        mapLayer = null;
      }

      // 创建新的 OccupancyGrid 图层
      const grid = new ROS2D.OccupancyGrid({
        ros: ros,
        message: mapMsg // 传入最新的地图数据
      });

      // 将新图层添加到视图
      mapLayer = grid;
      viewer.scene.addChild(mapLayer);

      // 自动缩放地图适配视图，并调整位置
      // viewer.scaleToDimensions(mapMsg.info.width, mapMsg.info.height);
      // viewer.shift(mapMsg.info.origin.position.x, mapMsg.info.origin.position.y);


    

    const gridClient = new ROS2D.OccupancyGridClient({
      ros: ros,
      rootObject: viewer.scene,
      topic: '/map'
    });

    // 自动缩放地图
    gridClient.on('change', function () {
      viewer.scaleToDimensions(
        gridClient.currentGrid.width,
        gridClient.currentGrid.height
      );
      viewer.shift(
        gridClient.currentGrid.pose.position.x,
        gridClient.currentGrid.pose.position.y
      );
    });





    });

    // 6. 页面关闭时取消订阅（避免内存泄漏）
    window.addEventListener('beforeunload', function() {
      mapTopic.unsubscribe();
      ros.close();
    });
  </script>
</body>
</html>
